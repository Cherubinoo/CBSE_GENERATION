{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0 animate__animated animate__fadeIn">
        <div class="card-header bg-primary text-white d-flex align-items-center justify-content-between">
            <h2 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Exam Pattern</h2>
        </div>
        <div class="card-body p-4">
            <form id="editExamPatternForm" enctype="multipart/form-data">
                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Class</label>
                        <select class="form-select" name="class" id="classSelect" required>
                            <option value="">Select Class</option>
                            {% for i in range(1,13) %}
                            <option value="{{ i }}">Class {{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Select Exam Pattern</label>
                        <select class="form-select" name="pattern_id" id="patternSelect" required>
                            <option value="">Select Exam Pattern</option>
                        </select>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Exam Type</label>
                        <select class="form-select" name="exam_type" id="examTypeSelect" required>
                            <option value="">Select Exam Type</option>
                            <option value="unit test">Unit Test</option>
                            <option value="sliptest">Sliptest</option>
                            <option value="premidterm">Pre Midterm</option>
                            <option value="postmidterm">Post Midterm</option>
                            <option value="1st terminal">1st Terminal</option>
                            <option value="2nd terminal">2nd Terminal</option>
                            <option value="other">Other (specify below)</option>
                        </select>
                        <div class="mt-2" id="examTypeOtherOption" style="display:none;">
                            <input type="text" class="form-control" name="custom_exam_type" 
                                   placeholder="Enter custom exam type">
                        </div>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Select Chapters</label>
                    <div id="chaptersContainer">
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>Select a class to load available chapters
                        </div>
                    </div>
                    <div class="mt-3">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addChapterBtn">
                            <i class="fas fa-plus me-1"></i>Add Custom Chapter
                        </button>
                        <div class="mt-2" id="customChapterOption" style="display:none;">
                            <input type="text" class="form-control" name="custom_chapter" 
                                   placeholder="Enter new chapter name">
                            <button type="button" class="btn btn-primary btn-sm mt-2" id="saveChapterBtn">
                                <i class="fas fa-save me-1"></i>Save Chapter
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Marking Scheme</label>
                    <textarea class="form-control" name="marking_scheme" id="markingScheme" rows="6" 
                              placeholder="Enter marking scheme details..." required></textarea>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Upload Exam Pattern Document (PDF, DOC, DOCX)</label>
                    <input type="file" class="form-control" name="file" id="fileInput" 
                           accept=".pdf,.doc,.docx">
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" name="clear_file" id="clearFile">
                        <label class="form-check-label" for="clearFile">Clear existing file</label>
                    </div>
                    <small class="form-text text-muted">Optional: Upload a new document to replace the existing one (max 10MB).</small>
                    <div id="currentFile" class="mt-2"></div>
                </div>
                
                <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5 py-3" id="submitButton">
                        <span id="submitButtonText"><i class="fas fa-save me-2"></i>Update Exam Pattern</span>
                        <span id="submitButtonSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                    <button type="button" class="btn btn-danger btn-lg px-5 py-3 ms-3" id="deleteButton">
                        <span id="deleteButtonText"><i class="fas fa-trash me-2"></i>Delete Exam Pattern</span>
                        <span id="deleteButtonSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                </div>
            </form>
            
            <div id="resultMessage" class="mt-4 text-center"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
    .animate__fadeIn { animation: fadeIn 0.5s; }
    .chapter-item { margin-bottom: 0.5rem; }
    .spinner-border-sm { margin-left: 8px; }
</style>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const editExamPatternForm = document.getElementById('editExamPatternForm');
        const classSelect = document.getElementById('classSelect');
        const patternSelect = document.getElementById('patternSelect');
        const examTypeSelect = document.getElementById('examTypeSelect');
        const chaptersContainer = document.getElementById('chaptersContainer');
        const addChapterBtn = document.getElementById('addChapterBtn');
        const saveChapterBtn = document.getElementById('saveChapterBtn');
        const customChapterOption = document.getElementById('customChapterOption');
        const examTypeOtherOption = document.getElementById('examTypeOtherOption');
        const resultMessage = document.getElementById('resultMessage');
        const submitButton = document.getElementById('submitButton');
        const submitButtonText = document.getElementById('submitButtonText');
        const submitButtonSpinner = document.getElementById('submitButtonSpinner');
        const deleteButton = document.getElementById('deleteButton');
        const deleteButtonText = document.getElementById('deleteButtonText');
        const deleteButtonSpinner = document.getElementById('deleteButtonSpinner');
        const fileInput = document.getElementById('fileInput');
        const clearFile = document.getElementById('clearFile');
        const markingScheme = document.getElementById('markingScheme');
        const currentFile = document.getElementById('currentFile');

        // Show feedback message
        function showFeedback(message, type = 'success') {
            resultMessage.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>`;
            setTimeout(() => resultMessage.innerHTML = '', 5000);
        }

        // Reset form
        function resetForm() {
            editExamPatternForm.reset();
            fileInput.value = '';
            clearFile.checked = false;
            examTypeOtherOption.style.display = 'none';
            customChapterOption.style.display = 'none';
            patternSelect.value = '';
            currentFile.innerHTML = '';
            chaptersContainer.innerHTML = `
                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>Select a class to load available chapters
                </div>`;
        }

        // Load exam patterns for a specific class
        async function loadExamPatterns(classLevel) {
            patternSelect.innerHTML = '<option value="">Select Exam Pattern</option>';
            if (!classLevel) {
                resetForm();
                return;
            }
            try {
                const response = await fetch(`/get_exam_patterns/${classLevel}`);
                if (!response.ok) throw new Error(`Failed to load exam patterns (Status: ${response.status})`);
                const patterns = await response.json();
                if (patterns.error) throw new Error(patterns.error);
                if (patterns.length > 0) {
                    patterns.forEach(pattern => {
                        const option = document.createElement('option');
                        option.value = pattern.id;
                        option.textContent = `${pattern.name} (Class ${pattern.class_level})`;
                        patternSelect.appendChild(option);
                    });
                } else {
                    patternSelect.innerHTML += '<option value="">No exam patterns found</option>';
                }
            } catch (error) {
                console.error('Error loading exam patterns:', error);
                showFeedback(`Failed to load exam patterns: ${error.message}`, 'danger');
            }
        }

        // Load chapters for a specific class
        async function loadChapters(classLevel, selectedChapters = []) {
            if (!classLevel) {
                chaptersContainer.innerHTML = `
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>Select a class to load available chapters
                    </div>`;
                return;
            }
            chaptersContainer.innerHTML = `
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Loading chapters...</p>
                </div>`;
            try {
                const response = await fetch(`/get_chapters/${classLevel}`);
                if (!response.ok) throw new Error(`Failed to load chapters (Status: ${response.status})`);
                const chapters = await response.json();
                if (chapters.length > 0) {
                    let html = `<div class="chapter-list">`;
                    chapters.forEach(chapter => {
                        const isChecked = selectedChapters.includes(chapter) ? 'checked' : '';
                        html += `
                            <div class="form-check chapter-item">
                                <input class="form-check-input" type="checkbox" name="chapters" 
                                       value="${chapter}" id="chapter_${chapter.replace(/\s+/g, '_')}" ${isChecked}>
                                <label class="form-check-label" for="chapter_${chapter.replace(/\s+/g, '_')}">${chapter}</label>
                            </div>`;
                    });
                    html += `</div>`;
                    chaptersContainer.innerHTML = html;
                } else {
                    chaptersContainer.innerHTML = `
                        <div class="alert alert-warning">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            No chapters found for this class. Please upload content first or add custom chapters.
                        </div>`;
                }
            } catch (error) {
                console.error('Error loading chapters:', error);
                showFeedback(`Failed to load chapters: ${error.message}`, 'danger');
            }
        }

        // Load exam pattern details
        async function loadPatternDetails(patternId) {
            if (!patternId) {
                examTypeSelect.value = '';
                markingScheme.value = '';
                currentFile.innerHTML = '';
                clearFile.checked = false;
                chaptersContainer.innerHTML = `
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>Select an exam pattern to load details
                    </div>`;
                return;
            }
            try {
                const response = await fetch(`/edit_exam_pattern/${patternId}`);
                if (!response.ok) throw new Error(`Failed to load pattern details (Status: ${response.status})`);
                const pattern = await response.json();
                if (pattern.error) throw new Error(pattern.error);
                
                // Populate fields
                classSelect.value = pattern.class_level || '';
                examTypeSelect.value = pattern.name || '';
                markingScheme.value = pattern.description || '';
                currentFile.innerHTML = pattern.filename ? 
                    `<small>Current file: ${pattern.filename}</small>` : 
                    '<small>No file uploaded</small>';
                clearFile.checked = false;
                
                // Load chapters
                await loadChapters(pattern.class_level, pattern.chapters);
                
                // Handle exam type
                const examTypes = ['unit test', 'sliptest', 'premidterm', 'postmidterm', '1st terminal', '2nd terminal'];
                examTypeOtherOption.style.display = examTypes.includes(pattern.name) ? 'none' : 'block';
                if (!examTypes.includes(pattern.name)) {
                    examTypeSelect.value = 'other';
                    document.querySelector('input[name="custom_exam_type"]').value = pattern.name;
                }
            } catch (error) {
                console.error('Error loading pattern details:', error);
                showFeedback(`Failed to load pattern details: ${error.message}`, 'danger');
            }
        }

        // Class dropdown change handler
        classSelect.addEventListener('change', () => {
            patternSelect.value = '';
            loadExamPatterns(classSelect.value);
            loadChapters(classSelect.value);
        });

        // Pattern dropdown change handler
        patternSelect.addEventListener('change', () => {
            loadPatternDetails(patternSelect.value);
        });

        // Exam type dropdown change handler
        examTypeSelect.addEventListener('change', () => {
            examTypeOtherOption.style.display = examTypeSelect.value === 'other' ? 'block' : 'none';
            const customInput = examTypeOtherOption.querySelector('input');
            customInput.required = examTypeSelect.value === 'other';
            if (!customInput.required) customInput.value = '';
        });

        // File input and clear file checkbox handler
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                clearFile.checked = false;
            }
        });
        clearFile.addEventListener('change', () => {
            if (clearFile.checked) {
                fileInput.value = '';
            }
        });

        // Add custom chapter button
        addChapterBtn.addEventListener('click', () => {
            customChapterOption.style.display = 'block';
        });

        // Save custom chapter button
        saveChapterBtn.addEventListener('click', () => {
            const chapterName = document.querySelector('input[name="custom_chapter"]').value.trim();
            if (!chapterName) {
                showFeedback('Custom chapter name is required', 'danger');
                return;
            }
            const newCheckbox = document.createElement('div');
            newCheckbox.className = 'form-check chapter-item';
            const uniqueId = `chapter_new_${Date.now()}`;
            newCheckbox.innerHTML = `
                <input class="form-check-input" type="checkbox" name="chapters" 
                       value="${chapterName}" id="${uniqueId}" checked>
                <label class="form-check-label" for="${uniqueId}">${chapterName}</label>
            `;
            const chapterList = chaptersContainer.querySelector('.chapter-list');
            if (chapterList) {
                chapterList.appendChild(newCheckbox);
            } else {
                chaptersContainer.innerHTML = `<div class="chapter-list">${newCheckbox.outerHTML}</div>`;
            }
            document.querySelector('input[name="custom_chapter"]').value = '';
            customChapterOption.style.display = 'none';
        });

        // Form submission
        editExamPatternForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitButtonText.classList.add('d-none');
            submitButtonSpinner.classList.remove('d-none');
            submitButton.disabled = true;
            resultMessage.innerHTML = `
                <div class="text-center py-2">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Processing...</span>
                    </div>
                    <p class="mt-2">Updating exam pattern...</p>
                </div>`;
            
            const formData = new FormData(editExamPatternForm);
            const patternId = formData.get('pattern_id');
            const classLevel = formData.get('class');
            const examType = formData.get('exam_type');
            const customExamType = formData.get('custom_exam_type');
            const markingScheme = formData.get('marking_scheme');
            const chapters = formData.getAll('chapters');
            const customChapter = formData.get('custom_chapter');
            const file = fileInput.files[0];
            const clearFileChecked = clearFile.checked;

            // Validate inputs
            if (!patternId) {
                showFeedback('Please select an exam pattern', 'danger');
                submitButtonText.classList.remove('d-none');
                submitButtonSpinner.classList.add('d-none');
                submitButton.disabled = false;
                return;
            }
            if (!classLevel) {
                showFeedback('Please select a class', 'danger');
                submitButtonText.classList.remove('d-none');
                submitButtonSpinner.classList.add('d-none');
                submitButton.disabled = false;
                return;
            }
            if (!examType) {
                showFeedback('Please select an exam type', 'danger');
                submitButtonText.classList.remove('d-none');
                submitButtonSpinner.classList.add('d-none');
                submitButton.disabled = false;
                return;
            }
            if (examType === 'other' && !customExamType) {
                showFeedback('Custom exam type is required', 'danger');
                submitButtonText.classList.remove('d-none');
                submitButtonSpinner.classList.add('d-none');
                submitButton.disabled = false;
                return;
            }
            if (!markingScheme) {
                showFeedback('Marking scheme is required', 'danger');
                submitButtonText.classList.remove('d-none');
                submitButtonSpinner.classList.add('d-none');
                submitButton.disabled = false;
                return;
            }
            if (!chapters.length && !customChapter) {
                showFeedback('Please select at least one chapter', 'danger');
                submitButtonText.classList.remove('d-none');
                submitButtonSpinner.classList.add('d-none');
                submitButton.disabled = false;
                return;
            }
            if (file && clearFileChecked) {
                showFeedback('Cannot upload a new file and clear the existing file at the same time', 'danger');
                submitButtonText.classList.remove('d-none');
                submitButtonSpinner.classList.add('d-none');
                submitButton.disabled = false;
                return;
            }
            if (file) {
                const ext = file.name.split('.').pop().toLowerCase();
                if (!['pdf', 'doc', 'docx'].includes(ext)) {
                    showFeedback('Unsupported file type. Allowed: PDF, DOC, DOCX', 'danger');
                    submitButtonText.classList.remove('d-none');
                    submitButtonSpinner.classList.add('d-none');
                    submitButton.disabled = false;
                    return;
                }
                if (file.size > 10 * 1024 * 1024) {
                    showFeedback('File size exceeds 10MB limit', 'danger');
                    submitButtonText.classList.remove('d-none');
                    submitButtonSpinner.classList.add('d-none');
                    submitButton.disabled = false;
                    return;
                }
            }
            
            try {
                const response = await fetch(`/edit_exam_pattern/${patternId}`, {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) throw new Error(`Server error: Status ${response.status}`);
                const data = await response.json();
                if (data.error) {
                    showFeedback(data.error, 'danger');
                } else {
                    showFeedback(data.message, 'success');
                    resetForm();
                }
            } catch (error) {
                console.error('Error updating exam pattern:', error);
                showFeedback(`Failed to update exam pattern: ${error.message}`, 'danger');
            } finally {
                submitButtonText.classList.remove('d-none');
                submitButtonSpinner.classList.add('d-none');
                submitButton.disabled = false;
            }
        });

        // Delete pattern
        deleteButton.addEventListener('click', async () => {
            const patternId = patternSelect.value;
            if (!patternId) {
                showFeedback('Please select an exam pattern to delete', 'danger');
                return;
            }
            if (!confirm('Are you sure you want to delete this exam pattern? This cannot be undone.')) {
                return;
            }
            deleteButtonText.classList.add('d-none');
            deleteButtonSpinner.classList.remove('d-none');
            deleteButton.disabled = true;
            try {
                const response = await fetch(`/delete_exam_pattern/${patternId}`, {
                    method: 'POST'
                });
                if (!response.ok) throw new Error(`Server error: Status ${response.status}`);
                const data = await response.json();
                if (data.error) {
                    showFeedback(data.error, 'danger');
                } else {
                    showFeedback(data.message, 'success');
                    resetForm();
                    loadExamPatterns(classSelect.value);
                }
            } catch (error) {
                console.error('Error deleting exam pattern:', error);
                showFeedback(`Failed to delete exam pattern: ${error.message}`, 'danger');
            } finally {
                deleteButtonText.classList.remove('d-none');
                deleteButtonSpinner.classList.add('d-none');
                deleteButton.disabled = false;
            }
        });
    });
</script>
{% endblock %}
