<!-- File: templates/edit_exam_pattern.html -->
{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg border-0 animate__animated animate__fadeIn">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h2 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Exam Pattern</h2>
                </div>
                <div class="card-body p-4">
                    <form id="editExamPatternForm" method="POST" enctype="multipart/form-data" class="space-y-4">
                        <!-- Class Selection -->
                        <div class="mb-4">
                            <label for="classSelect" class="form-label fw-bold">Class</label>
                            <select class="form-select" name="class" id="classSelect" required>
                                <option value="">Select Class</option>
                                {% for i in range(1,13) %}
                                <option value="{{ i }}">Class {{ i }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <!-- Exam Pattern Selection -->
                        <div class="mb-4">
                            <label for="patternSelect" class="form-label fw-bold">Exam Pattern</label>
                            <select class="form-select" name="pattern_id" id="patternSelect" required>
                                <option value="">Select Exam Pattern</option>
                            </select>
                        </div>
                        <!-- Subject Selection -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Subjects</label>
                            <div id="subjectsContainer" class="border rounded p-3 bg-light max-h-48 overflow-y-auto">
                                <p id="subjectsPlaceholder" class="text-sm text-muted">Select a class to load subjects</p>
                            </div>
                            <input type="hidden" id="subjectsHidden" name="subjects" required>
                            <p id="subjectsError" class="text-sm text-danger d-none mt-1">Please select at least one subject</p>
                        </div>
                        <!-- Sub-Subject Selection -->
                        <div class="mb-4" id="subSubjectDiv" style="display:none;">
                            <label for="subSubjectSelect" class="form-label fw-bold">Sub-Subject (Optional)</label>
                            <select class="form-select" name="sub_subject" id="subSubjectSelect" disabled>
                                <option value="">Select Sub-Subject</option>
                            </select>
                        </div>
                        <!-- Exam Type Selection -->
                        <div class="mb-4">
                            <label for="examTypeSelect" class="form-label fw-bold">Exam Type</label>
                            <select class="form-select" name="exam_type" id="examTypeSelect" required>
                                <option value="">Select Exam Type</option>
                            </select>
                            <div class="mt-2" id="customExamTypeDiv" style="display:none;">
                                <input type="text" class="form-control" name="custom_exam_type" id="customExamTypeInput" placeholder="Enter custom exam type">
                            </div>
                        </div>
                        <!-- Chapters Selection -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Chapters</label>
                            <div id="chaptersContainer" class="border rounded p-3 bg-light max-h-48 overflow-y-auto">
                                <p id="chaptersPlaceholder" class="text-sm text-muted">Select a subject to load chapters</p>
                            </div>
                            <input type="hidden" id="chaptersHidden" name="chapters" required>
                            <p id="chaptersError" class="text-sm text-danger d-none mt-1">Please select at least one chapter</p>
                        </div>
                        <!-- File Upload -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Current File</label>
                            <p id="currentFile" class="text-sm text-muted">No file selected</p>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" name="clear_file" id="clearFile">
                                <label class="form-check-label text-sm" for="clearFile">Clear current file</label>
                            </div>
                            <label for="fileInput" class="form-label fw-bold">Upload New File (PDF, max 10MB)</label>
                            <input class="form-control" type="file" name="file" id="fileInput" accept=".pdf">
                        </div>
                        <!-- Submit Button -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-lg px-5">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                        </div>
                    </form>
                    <div id="resultMessage" class="mt-4 text-center"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const classSelect = document.getElementById('classSelect');
    const patternSelect = document.getElementById('patternSelect');
    const subjectsContainer = document.getElementById('subjectsContainer');
    const subjectsPlaceholder = document.getElementById('subjectsPlaceholder');
    const subjectsHidden = document.getElementById('subjectsHidden');
    const subjectsError = document.getElementById('subjectsError');
    const subSubjectDiv = document.getElementById('subSubjectDiv');
    const subSubjectSelect = document.getElementById('subSubjectSelect');
    const examTypeSelect = document.getElementById('examTypeSelect');
    const customExamTypeDiv = document.getElementById('customExamTypeDiv');
    const customExamTypeInput = document.getElementById('customExamTypeInput');
    const chaptersContainer = document.getElementById('chaptersContainer');
    const chaptersPlaceholder = document.getElementById('chaptersPlaceholder');
    const chaptersHidden = document.getElementById('chaptersHidden');
    const chaptersError = document.getElementById('chaptersError');
    const currentFile = document.getElementById('currentFile');
    const clearFile = document.getElementById('clearFile');
    const form = document.getElementById('editExamPatternForm');
    const resultDiv = document.getElementById('resultMessage');

    // Load exam types
    fetch('/get_exam_types')
        .then(response => response.json())
        .then(data => {
            examTypeSelect.innerHTML = '<option value="">Select Exam Type</option>';
            data.forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                option.textContent = type;
                examTypeSelect.appendChild(option);
            });
            examTypeSelect.innerHTML += '<option value="other">Other</option>';
        })
        .catch(error => showError(`Failed to load exam types: ${error.message}`));

    // Toggle custom exam type input
    examTypeSelect.addEventListener('change', function() {
        customExamTypeDiv.style.display = this.value === 'other' ? 'block' : 'none';
        customExamTypeInput.required = this.value === 'other';
    });

    // Load subjects
    function loadSubjects(classLevel, selectedSubjects = []) {
        if (!classLevel) {
            subjectsContainer.innerHTML = '';
            subjectsPlaceholder.classList.remove('d-none');
            subjectsHidden.value = '';
            subSubjectDiv.style.display = 'none';
            subSubjectSelect.disabled = true;
            patternSelect.innerHTML = '<option value="">Select Exam Pattern</option>';
            return;
        }
        fetch(`/get_subjects/${classLevel}`)
            .then(response => response.json())
            .then(data => {
                subjectsContainer.innerHTML = '';
                subjectsPlaceholder.classList.add('d-none');
                data.forEach(subject => {
                    const div = document.createElement('div');
                    div.className = 'form-check mb-2';
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'form-check-input';
                    checkbox.name = 'subjects[]';
                    checkbox.value = subject;
                    checkbox.id = `subject_${subject.replace(/\s/g, '_')}`;
                    checkbox.checked = selectedSubjects.includes(subject);
                    const label = document.createElement('label');
                    label.className = 'form-check-label';
                    label.htmlFor = checkbox.id;
                    label.textContent = subject;
                    div.appendChild(checkbox);
                    div.appendChild(label);
                    subjectsContainer.appendChild(div);
                });
                subjectsHidden.value = selectedSubjects.join(',');
            })
            .catch(error => showError(`Failed to load subjects: ${error.message}`));

        // Load exam patterns
        fetch(`/get_exam_patterns/${classLevel}`)
            .then(response => response.json())
            .then(data => {
                patternSelect.innerHTML = '<option value="">Select Exam Pattern</option>';
                data.forEach(pattern => {
                    const option = document.createElement('option');
                    option.value = pattern.id;
                    option.textContent = `${pattern.name} (${pattern.subjects}${pattern.sub_subject ? ' - ' + pattern.sub_subject : ''})`;
                    patternSelect.appendChild(option);
                });
            })
            .catch(error => showError(`Failed to load exam patterns: ${error.message}`));
    }

    // Load sub-subjects
    function loadSubSubjects(subject, selectedSubSubject = '') {
        const classLevel = classSelect.value;
        subSubjectDiv.style.display = 'none';
        subSubjectSelect.innerHTML = '<option value="">Select Sub-Subject</option>';
        subSubjectSelect.disabled = true;
        if (subject && (subject.includes('Social Studies') || subject.includes('Science'))) {
            fetch(`/get_sub_subjects/${classLevel}/${subject}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        subSubjectDiv.style.display = 'block';
                        data.forEach(subSubject => {
                            const option = document.createElement('option');
                            option.value = subSubject;
                            option.textContent = subSubject;
                            option.selected = subSubject === selectedSubSubject;
                            subSubjectSelect.appendChild(option);
                        });
                        subSubjectSelect.disabled = false;
                    }
                })
                .catch(error => showError(`Failed to load sub-subjects: ${error.message}`));
        }
    }

    // Load chapters
    function loadChapters(classLevel, subjects, subSubject = '', selectedChapters = []) {
        chaptersContainer.innerHTML = '';
        chaptersPlaceholder.classList.remove('d-none');
        chaptersHidden.value = '';
        if (classLevel && subjects.length) {
            chaptersPlaceholder.classList.add('d-none');
            subjects.forEach(subject => {
                const url = subSubject && (subject === 'Social Studies' || subject === 'Science') ? 
                    `/get_chapters/${classLevel}/${subject}/${subSubject}` : 
                    `/get_chapters/${classLevel}/${subject}`;
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        data.forEach(chapter => {
                            const div = document.createElement('div');
                            div.className = 'form-check mb-2';
                            const checkbox = document.createElement('input');
                            checkbox.type = 'checkbox';
                            checkbox.className = 'form-check-input';
                            checkbox.name = 'chapters[]';
                            checkbox.value = `${subject}:${chapter}`;
                            checkbox.id = `chapter_${subject.replace(/\s/g, '_')}_${chapter.replace(/\s/g, '_')}`;
                            checkbox.checked = selectedChapters.includes(`${subject}:${chapter}`);
                            const label = document.createElement('label');
                            label.className = 'form-check-label';
                            label.htmlFor = checkbox.id;
                            label.textContent = `${subject} - ${chapter}`;
                            div.appendChild(checkbox);
                            div.appendChild(label);
                            chaptersContainer.appendChild(div);
                        });
                        chaptersHidden.value = selectedChapters.join(',');
                    })
                    .catch(error => showError(`Failed to load chapters: ${error.message}`));
            });
        }
    }

    // Handle class selection
    classSelect.addEventListener('change', function() {
        loadSubjects(this.value);
        chaptersContainer.innerHTML = '';
        chaptersPlaceholder.classList.remove('d-none');
        chaptersHidden.value = '';
        subjectsHidden.value = '';
        subSubjectDiv.style.display = 'none';
        subSubjectSelect.disabled = true;
    });

    // Handle subject selection
    subjectsContainer.addEventListener('change', function(e) {
        if (e.target.type === 'checkbox') {
            const selectedSubjects = Array.from(subjectsContainer.querySelectorAll('input:checked'))
                .map(checkbox => checkbox.value);
            subjectsHidden.value = selectedSubjects.join(',');
            subjectsError.classList.add('d-none');
            subSubjectDiv.style.display = 'none';
            subSubjectSelect.disabled = true;
            chaptersContainer.innerHTML = '';
            chaptersPlaceholder.classList.remove('d-none');
            chaptersHidden.value = '';
            if (selectedSubjects.length === 1) {
                loadSubSubjects(selectedSubjects[0]);
                loadChapters(classSelect.value, selectedSubjects);
            } else if (selectedSubjects.length > 0) {
                loadChapters(classSelect.value, selectedSubjects);
            }
        }
    });

    // Handle sub-subject selection
    subSubjectSelect.addEventListener('change', function() {
        const classLevel = classSelect.value;
        let selectedSubjects = subjectsHidden.value.split(',').filter(s => s);
        const subSubject = this.value;
        if (selectedSubjects.length === 1 && subSubject) {
            const subject = selectedSubjects[0];
            // Restrict to single subject when sub-subject is selected
            subjectsContainer.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.checked = checkbox.value === subject;
            });
            subjectsHidden.value = subject;
            loadChapters(classLevel, [subject], subSubject);
        } else {
            // Reload subjects and chapters without sub-subject restriction
            loadSubjects(classLevel, selectedSubjects);
            loadChapters(classLevel, selectedSubjects);
        }
    });

    // Handle chapter selection
    chaptersContainer.addEventListener('change', function(e) {
        if (e.target.type === 'checkbox') {
            const selectedChapters = Array.from(chaptersContainer.querySelectorAll('input:checked'))
                .map(checkbox => checkbox.value);
            chaptersHidden.value = selectedChapters.join(',');
            chaptersError.classList.add('d-none');
        }
    });

    // Load exam pattern details
    patternSelect.addEventListener('change', function() {
        const patternId = this.value;
        if (!patternId) {
            form.reset();
            subjectsContainer.innerHTML = '';
            subjectsPlaceholder.classList.remove('d-none');
            chaptersContainer.innerHTML = '';
            chaptersPlaceholder.classList.remove('d-none');
            subSubjectDiv.style.display = 'none';
            customExamTypeDiv.style.display = 'none';
            currentFile.textContent = 'No file selected';
            return;
        }
        fetch(`/edit_exam_pattern/${patternId}`)
            .then(response => response.json())
            .then(data => {
                if (data.error) return showError(data.error);
                classSelect.value = data.class_level;
                loadSubjects(data.class_level, data.subjects);
                loadSubSubjects(data.subjects[0] || '', data.sub_subject || '');
                loadChapters(data.class_level, data.subjects, data.sub_subject || '', data.chapters);
                examTypeSelect.value = data.exam_type || '';
                if (!Array.from(examTypeSelect.options).some(opt => opt.value === data.exam_type)) {
                    examTypeSelect.value = 'other';
                    customExamTypeInput.value = data.exam_type || '';
                    customExamTypeDiv.style.display = 'block';
                    customExamTypeInput.required = true;
                }
                currentFile.textContent = data.filename || 'No file selected';
            })
            .catch(error => showError(`Failed to load exam pattern: ${error.message}`));
    });

    // Handle form submission
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const patternId = patternSelect.value;
        if (!patternId) return showError('Please select an exam pattern');
        if (!subjectsHidden.value) return subjectsError.classList.remove('d-none');
        if (!chaptersHidden.value) return chaptersError.classList.remove('d-none');
        resultDiv.innerHTML = `
            <div class="text-center py-2">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Processing...</span>
                </div>
                <p class="mt-2">Saving changes...</p>
            </div>`;
        fetch(`/edit_exam_pattern/${patternId}`, {
            method: 'POST',
            body: new FormData(form)
        })
            .then(response => response.json())
            .then(data => {
                resultDiv.innerHTML = data.error ? 
                    `<div class="alert alert-danger">❌ ${data.error}</div>` :
                    `<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i>✅ ${data.message}</div>`;
                if (!data.error) setTimeout(() => location.href = '/create_exam_pattern', 1500);
            })
            .catch(error => showError(`Failed to save changes: ${error.message}`));
    });

    // Show error message
    function showError(message) {
        resultDiv.innerHTML = `<div class="alert alert-danger">❌ ${message}</div>`;
    }
});
</script>
{% endblock %}
