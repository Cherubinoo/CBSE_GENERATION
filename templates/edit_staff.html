<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #ecf0f1; font-family: 'Roboto', sans-serif; color: #2c3e50; }
        .container { background: #fff; border-radius: 8px; padding: 2rem; margin: 2rem auto; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); }
        .btn-back { background: #3498db; color: #fff; border: none; border-radius: 6px; padding: 0.75rem 1.5rem; }
        .btn-back:hover { background: #2980b9; }
        .form-label { font-weight: 500; }
        .form-control { border: 1px solid #3498db; }
        .form-control:focus { border-color: #2980b9; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Edit Staff</h1>
            <a href="{{ url_for('view_staff') }}" class="btn btn-back">Back to Staff Management</a>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ staff.name }}" required>
            </div>
            <div class="mb-3">
                <label for="role" class="form-label">Role</label>
                <select class="form-control" id="role" name="role" required>
                    <option value="Teacher" {% if staff.role == 'Teacher' %}selected{% endif %}>Teacher</option>
                    <option value="Admin" {% if staff.role == 'Admin' %}selected{% endif %}>Admin</option>
                    <option value="Support" {% if staff.role == 'Support' %}selected{% endif %}>Support</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ staff.email }}" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone" value="{{ staff.phone|default('') }}">
            </div>
            <button type="submit" class="btn btn-primary">Update Staff</button>
        </form>
    </div>
</body>
</html>
